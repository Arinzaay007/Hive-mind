<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Mind - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0d0d00;
            --bg-tertiary: #1a1a00;
            --text-primary: #ffe600;
            --text-secondary: #ffd000;
            --text-muted: #7a7a00;
            --border: #2a2a00;
            --accent: #ffe600;
            --error: #ff006e;
            --matrix-glow: rgba(255, 230, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.12; pointer-events: none;
        }
        .container {
            position: relative; z-index: 2;
            max-width: 480px; width: 100%; padding: 24px;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 32px; font-weight: 700;
            letter-spacing: 4px; margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255,230,0,0.6), 0 0 40px rgba(255,230,0,0.3);
        }
        .logo::before { content: '⬡ '; color: var(--accent); }
        .tagline { font-size: 13px; color: var(--text-muted); letter-spacing: 3px; }
        .signin-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-top: 2px solid var(--accent);
            padding: 40px 32px;
            box-shadow: 0 0 40px rgba(255,230,0,0.1);
        }
        .card-title {
            font-family: 'Space Mono', monospace;
            font-size: 22px; font-weight: 700; margin-bottom: 8px;
        }
        .card-title::before { content: '# '; color: var(--accent); }
        .card-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-label {
            display: block; font-size: 12px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .form-label::before { content: '$ '; color: var(--accent); }
        .form-input {
            width: 100%; background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 12px 16px; color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace; font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 15px var(--matrix-glow);
        }
        .form-input::placeholder { color: var(--text-muted); }
        .submit-btn {
            width: 100%; background: var(--accent);
            border: none; padding: 14px 24px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            color: #000000; letter-spacing: 1px;
        }
        .submit-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px var(--matrix-glow);
            transform: translateY(-2px);
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .signin-footer {
            text-align: center; margin-top: 24px;
            font-size: 13px; color: var(--text-muted);
        }
        .signin-footer a { color: var(--accent); text-decoration: none; }
        .signin-footer a:hover { text-shadow: 0 0 8px var(--matrix-glow); }
        .honeycomb-divider {
            text-align: center; font-size: 10px;
            color: var(--border); letter-spacing: 4px;
            margin: 20px 0; opacity: 0.5;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo">HIVE MIND</div>
            <div class="tagline">WHERE MINDS CONNECT</div>
        </div>
        <div class="signin-card">
            <h1 class="card-title">Sign In</h1>
            <p class="card-subtitle">Welcome back to the hive 🐝</p>
            <div class="honeycomb-divider">⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡</div>
            <form id="signinForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.dev" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">🐝 Sign In</button>
            </form>
        </div>
        <div class="signin-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '⬡⬢01アイウエオカキクケコ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffe600';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        const SUPABASE_URL = 'https://cwoaqiwnpcpawignecsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3b2FxaXducGNwYXdpZ25lY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMTM1OTksImV4cCI6MjA4NjY4OTU5OX0.o7eW1g7r8PYvtE4G1lxLDqVZpxpbxs3_cwg_7STBZTI';
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { alert('Please enter email and password!'); return; }
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = '⏳ Signing in...';
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (!data.user.email_confirmed_at) {
                    alert('⚠️ Please verify your email first! Check your inbox.');
                    btn.disabled = false; btn.textContent = '🐝 Sign In'; return;
                }
                window.location.href = 'app.html';
            } catch (error) {
                alert('❌ Sign in failed: ' + error.message);
                btn.disabled = false; btn.textContent = '🐝 Sign In';
            }
        });
        document.getElementById('email').focus();
    </script>
</body>
</html>
