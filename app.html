<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Mind - Main App</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --text-primary: #00ff41;
            --text-secondary: #00cc33;
            --text-muted: #666666;
            --border: #222222;
            --accent: #00ff41;
            --matrix-glow: rgba(0, 255, 65, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text-primary: #0a0a0a;
            --text-secondary: #333333;
            --text-muted: #888888;
            --border: #dddddd;
            --accent: #00cc33;
            --matrix-glow: rgba(0, 204, 51, 0.2);
        }

        [data-theme="cyberpunk"] {
            --bg-primary: #0d001a;
            --bg-secondary: #1a0033;
            --bg-tertiary: #2d0052;
            --text-primary: #ff00ff;
            --text-secondary: #ff00aa;
            --text-muted: #8855aa;
            --border: #4d0080;
            --accent: #ff00ff;
            --matrix-glow: rgba(255, 0, 255, 0.4);
        }

        [data-theme="ocean"] {
            --bg-primary: #001a1f;
            --bg-secondary: #002633;
            --bg-tertiary: #003d4d;
            --text-primary: #00d9ff;
            --text-secondary: #00b8d4;
            --text-muted: #5591a3;
            --border: #004d5c;
            --accent: #00ffff;
            --matrix-glow: rgba(0, 255, 255, 0.3);
        }

        [data-theme="forest"] {
            --bg-primary: #0a1f0a;
            --bg-secondary: #153315;
            --bg-tertiary: #1f4d1f;
            --text-primary: #00ff00;
            --text-secondary: #00cc00;
            --text-muted: #669966;
            --border: #2d662d;
            --accent: #00ff00;
            --matrix-glow: rgba(0, 255, 0, 0.3);
        }

        [data-theme="sunset"] {
            --bg-primary: #1f0a0a;
            --bg-secondary: #331515;
            --bg-tertiary: #4d1f1f;
            --text-primary: #ff6600;
            --text-secondary: #ff8833;
            --text-muted: #b36644;
            --border: #662d1f;
            --accent: #ff6600;
            --matrix-glow: rgba(255, 102, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo::before {
            content: '> ';
            color: var(--accent);
        }

        .user-info {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 13px;
        }

        .sign-out-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
        }

        .sign-out-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .channel {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .channel:hover {
            background: var(--bg-tertiary);
        }

        .channel.active {
            background: var(--bg-tertiary);
            border-left-color: var(--accent);
            color: var(--accent);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--text-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-primary);
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
            align-items: baseline;
        }

        .username {
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .username:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
        }

        .message-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .message-input-container {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            resize: none;
            max-height: 100px;
            overflow-y: auto;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--matrix-glow);
        }

        .send-btn, .voice-btn {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            color: var(--bg-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .voice-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 16px;
        }

        .voice-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .voice-btn.recording {
            background: #ff006e;
            border-color: #ff006e;
            color: white;
            animation: pulse-record 1.5s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .send-btn:hover {
            box-shadow: 0 0 20px var(--matrix-glow);
        }

        .send-btn:disabled, .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 9999;
        }

        .loading-screen.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mention {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }

        .mention-me {
            background: #ff006e;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
            animation: pulse-mention 2s infinite;
        }

        @keyframes pulse-mention {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .mobile-menu-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
        }

        .reply-preview {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reply-preview-content {
            flex: 1;
        }

        .reply-preview-header {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .reply-preview-text {
            font-size: 12px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .reply-preview-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .reply-preview-close:hover {
            color: var(--accent);
        }

        .reply-reference {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .reply-reference-user {
            color: var(--accent);
            font-weight: 600;
        }

        .mention-dropdown {
            position: absolute;
            bottom: 100%;
            left: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .mention-dropdown.active {
            display: block;
        }

        .mention-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mention-item:hover {
            background: var(--bg-tertiary);
        }

        .mention-item.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }

        .mention-item-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--text-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--bg-primary);
        }

        .mention-item-username {
            font-size: 13px;
        }

        .voice-note-player {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 300px;
        }

        .voice-note-play-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--bg-primary);
            font-size: 14px;
            flex-shrink: 0;
        }

        .voice-note-play-btn:hover {
            box-shadow: 0 0 10px var(--matrix-glow);
        }

        .voice-note-waveform {
            flex: 1;
            height: 30px;
            background: var(--bg-secondary);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .voice-note-progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s;
        }

        .voice-note-duration {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .recording-timer {
            background: var(--bg-tertiary);
            padding: 8px 16px;
            margin-bottom: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            color: #ff006e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .recording-dot {
            width: 8px;
            height: 8px;
            background: #ff006e;
            border-radius: 50%;
            animation: pulse-record 1.5s infinite;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -240px;
                top: 58px;
                height: calc(100vh - 58px);
                z-index: 100;
                transition: left 0.3s ease;
            }

            .sidebar.mobile-open {
                left: 0;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .mobile-menu-btn {
                display: block !important;
            }

            .header {
                padding: 12px 16px;
            }

            .logo {
                font-size: 14px;
            }

            .user-info {
                font-size: 11px;
                gap: 8px;
            }

            .sign-out-btn {
                padding: 4px 8px;
                font-size: 11px;
            }

            .messages {
                padding: 12px;
                padding-bottom: 180px;
            }

            .message-input-container {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 12px;
                background: var(--bg-secondary);
                border-top: 2px solid var(--border);
                z-index: 50;
            }

            .input-wrapper {
                gap: 8px;
            }

            .message-input {
                font-size: 16px;
                padding: 12px;
                min-height: 48px;
            }

            .send-btn, .voice-btn {
                padding: 14px;
                font-size: 18px;
                min-width: 48px;
                min-height: 48px;
            }

            .voice-btn {
                padding: 14px 18px;
            }

            .recording-timer {
                margin-bottom: 12px;
                font-size: 16px;
                padding: 12px;
            }

            .chat-header h2 {
                font-size: 14px;
            }

            .message {
                gap: 8px;
            }

            .avatar {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .username {
                font-size: 12px;
            }

            .message-text {
                font-size: 13px;
            }

            .timestamp {
                font-size: 10px;
            }

            .mention-dropdown {
                left: 12px;
                right: 12px;
            }

            .voice-note-player {
                max-width: 100%;
            }

            .voice-note-play-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
        }

        @media (max-width: 400px) {
            .logo {
                font-size: 12px;
            }

            .messages {
                padding: 8px;
            }

            .message-input-container {
                padding: 8px;
            }

            .send-btn, .voice-btn {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div>Loading Hive Mind...</div>
    </div>

    <div class="app-container" style="display: none;" id="appContainer">
        <div class="header">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="logo">HIVE MIND</div>
            <div class="user-info">
                <select id="themeSelector" onchange="changeTheme(this.value)" style="background: var(--bg-tertiary); border: 1px solid var(--border); padding: 6px; color: var(--text-primary); margin-right: 8px; font-family: inherit; font-size: 12px;">
                    <option value="dark">🌑 Dark</option>
                    <option value="light">☀️ Light</option>
                    <option value="cyberpunk">💜 Cyberpunk</option>
                    <option value="ocean">🌊 Ocean</option>
                    <option value="forest">🌲 Forest</option>
                    <option value="sunset">🌅 Sunset</option>
                </select>
                <button class="sign-out-btn" onclick="goToProfile()" style="margin-right: 8px;">Profile</button>
                <span><span class="status-indicator"></span><span id="currentUser">Loading...</span></span>
                <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
            
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">Text Channels</div>
                    <div id="channelList"></div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <h2 id="currentChannelName"># general</h2>
                </div>

                <div class="messages" id="messages"></div>

                <div class="message-input-container">
                    <div class="mention-dropdown" id="mentionDropdown"></div>
                    <div id="replyPreview"></div>
                    <div id="recordingTimer"></div>
                    <div class="input-wrapper">
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Message #general..."
                            rows="1"
                        ></textarea>
                        <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecording()" title="Record voice note">🎤</button>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cwoaqiwnpcpawignecsb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3b2FxaXducGNwYXdpZ25lY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMTM1OTksImV4cCI6MjA4NjY4OTU5OX0.o7eW1g7r8PYvtE4G1lxLDqVZpxpbxs3_cwg_7STBZTI';

        let supabaseClient = null;
        let currentUser = null;
        let currentChannel = 'general';
        let messageSubscription = null;
        let replyingTo = null;
        let channelUsers = [];
        let mentionSelectedIndex = 0;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let recordingTimer = null;

        const channels = [
            { id: 'general', name: 'general', topic: 'Welcome to BuilderHub' },
            { id: 'random', name: 'random', topic: 'Off-topic vibes' },
            { id: 'react-native', name: 'react-native', topic: 'React Native dev' },
            { id: 'backend-wizards', name: 'backend-wizards', topic: 'Backend & APIs' },
            { id: 'shipped-today', name: 'shipped-today', topic: 'Show what you shipped' }
        ];

        async function init() {
            try {
                const { createClient } = window.supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

                const { data: { user }, error } = await supabaseClient.auth.getUser();

                if (error || !user) {
                    throw new Error('Not authenticated');
                }

                currentUser = user;

                const username = user.user_metadata?.username || user.email.split('@')[0];
                document.getElementById('currentUser').textContent = username;

                renderChannels();
                await loadMessages(currentChannel);
                await loadChannelUsers(currentChannel);
                subscribeToMessages(currentChannel);

                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('appContainer').style.display = 'flex';
                
                setTimeout(() => requestNotificationPermission(), 2000);
            } catch (error) {
                console.error('Initialization error:', error);
                alert('⚠️ Not signed in! Redirecting...');
                window.location.href = 'signin.html';
            }
        }

        function renderChannels() {
            const list = document.getElementById('channelList');
            list.innerHTML = channels.map(ch => `
                <div class="channel ${ch.id === currentChannel ? 'active' : ''}" onclick="switchChannel('${ch.id}')">
                    # ${ch.name}
                </div>
            `).join('');
        }

        async function switchChannel(channelId) {
            currentChannel = channelId;
            
            const channel = channels.find(c => c.id === channelId);
            document.getElementById('currentChannelName').textContent = `# ${channel.name}`;
            document.getElementById('messageInput').placeholder = `Message #${channel.name}...`;
            
            renderChannels();
            
            if (messageSubscription) {
                messageSubscription.unsubscribe();
            }
            
            await loadMessages(channelId);
            await loadChannelUsers(channelId);
            subscribeToMessages(channelId);
            
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');

        function seekAudio(audioId, event) {
            const audio = document.getElementById(audioId);
            if (!audio || !audio.duration) return;
            
            const waveform = event.currentTarget;
            const rect = waveform.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = clickX / rect.width;
            
            audio.currentTime = audio.duration * percentage;
        }

        async function playVoiceNote(btn, audioId) {
            const audio = document.getElementById(audioId);
            const progressBar = document.getElementById('progress-' + audioId.replace('audio-', ''));
            const durationSpan = document.getElementById('duration-' + audioId.replace('audio-', ''));
            
            if (!audio) {
                console.error('Audio element not found:', audioId);
                return;
            }

            const isPlaying = btn.getAttribute('data-playing') === 'true';
            
            document.querySelectorAll('audio').forEach(a => {
                if (a.id !== audioId && !a.paused) {
                    a.pause();
                    a.currentTime = 0;
                    const otherBtn = document.querySelector(`[onclick*="${a.id}"]`);
                    if (otherBtn) {
                        otherBtn.textContent = '▶';
                        otherBtn.setAttribute('data-playing', 'false');
                    }
                }
            });
            
            if (isPlaying) {
                audio.pause();
                audio.currentTime = 0;
                btn.textContent = '▶';
                btn.setAttribute('data-playing', 'false');
                if (progressBar) progressBar.style.width = '0%';
                return;
            }

            if (!audio.hasAttribute('data-listeners-added')) {
                audio.addEventListener('loadedmetadata', () => {
                    if (durationSpan && audio.duration) {
                        const mins = Math.floor(audio.duration / 60);
                        const secs = Math.floor(audio.duration % 60);
                        durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    }
                });

                audio.addEventListener('timeupdate', () => {
                    if (audio.duration) {
                        const progress = (audio.currentTime / audio.duration) * 100;
                        if (progressBar) progressBar.style.width = progress + '%';
                        
                        if (durationSpan) {
                            const remaining = audio.duration - audio.currentTime;
                            const mins = Math.floor(remaining / 60);
                            const secs = Math.floor(remaining % 60);
                            durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                        }
                    }
                });

                audio.addEventListener('ended', () => {
                    btn.textContent = '▶';
                    btn.setAttribute('data-playing', 'false');
                    if (progressBar) progressBar.style.width = '0%';
                    if (audio.duration && durationSpan) {
                        const mins = Math.floor(audio.duration / 60);
                        const secs = Math.floor(audio.duration % 60);
                        durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    }
                });

                audio.addEventListener('error', (e) => {
                    console.error('Audio playback error:', e);
                    alert('Unable to play voice note. The audio format may not be supported on this device.');
                    btn.textContent = '▶';
                    btn.setAttribute('data-playing', 'false');
                });

                audio.setAttribute('data-listeners-added', 'true');
            }

            try {
                await audio.play();
                btn.textContent = '⏸';
                btn.setAttribute('data-playing', 'true');
            } catch (error) {
                console.error('Play error:', error);
                alert('Could not play audio. Please try again.');
                btn.textContent = '▶';
                btn.setAttribute('data-playing', 'false');
            }
        }

        async function toggleVoiceRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('Your browser does not support audio recording. Please use a modern browser like Chrome or Safari.');
                    return;
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 44100
                    } 
                });

                const options = { mimeType: '' };
                
                if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    options.mimeType = 'audio/mp4';
                } else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    options.mimeType = 'audio/webm;codecs=opus';
                } else if (MediaRecorder.isTypeSupported('audio/webm')) {
                    options.mimeType = 'audio/webm';
                } else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
                    options.mimeType = 'audio/ogg;codecs=opus';
                } else {
                    options.mimeType = 'audio/webm';
                }

                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const mimeType = mediaRecorder.mimeType || 'audio/webm';
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    await sendVoiceNote(audioBlob, mimeType);
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();

                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.add('recording');
                voiceBtn.textContent = '⏹';
                voiceBtn.title = 'Stop recording';

                updateRecordingTimer();

            } catch (error) {
                console.error('Recording error:', error);
                
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    alert('🎤 Microphone access denied. Please allow microphone access in your browser settings and try again.');
                } else if (error.name === 'NotFoundError') {
                    alert('🎤 No microphone found. Please connect a microphone and try again.');
                } else {
                    alert('Could not start recording. Error: ' + error.message);
                }
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
                voiceBtn.title = 'Record voice note';

                document.getElementById('recordingTimer').innerHTML = '';
                if (recordingTimer) {
                    clearInterval(recordingTimer);
                    recordingTimer = null;
                }
            }
        }

        function updateRecordingTimer() {
            const timerDiv = document.getElementById('recordingTimer');
            
            recordingTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                
                timerDiv.innerHTML = `
                    <div class="recording-timer">
                        <div class="recording-dot"></div>
                        Recording ${mins}:${secs.toString().padStart(2, '0')}
                    </div>
                `;

                if (elapsed >= 120) {
                    stopRecording();
                }
            }, 100);
        }

        async function sendVoiceNote(audioBlob, mimeType) {
            try {
                const btn = document.getElementById('sendBtn');
                const voiceBtn = document.getElementById('voiceBtn');
                btn.disabled = true;
                voiceBtn.disabled = true;

                const username = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                
                let fileExt = 'webm';
                if (mimeType.includes('mp4')) {
                    fileExt = 'mp4';
                } else if (mimeType.includes('ogg')) {
                    fileExt = 'ogg';
                }
                
                const fileName = `voice-${Date.now()}.${fileExt}`;
                const filePath = `${currentUser.id}/${fileName}`;

                const timerDiv = document.getElementById('recordingTimer');
                timerDiv.innerHTML = '<div class="recording-timer">Uploading voice note...</div>';

                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('voice-notes')
                    .upload(filePath, audioBlob, {
                        contentType: mimeType,
                        upsert: false
                    });

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabaseClient.storage
                    .from('voice-notes')
                    .getPublicUrl(filePath);

                const messageData = {
                    channel_id: currentChannel,
                    user_id: currentUser.id,
                    username: username,
                    type: 'voice',
                    audio_url: publicUrl
                };

                if (replyingTo) {
                    messageData.reply_to_username = replyingTo.username;
                    messageData.reply_to_content = replyingTo.content;
                }

                const { error } = await supabaseClient
                    .from('messages')
                    .insert(messageData);

                if (error) throw error;

                cancelReply();
                timerDiv.innerHTML = '';

            } catch (error) {
                console.error('Send voice note error:', error);
                alert('Failed to send voice note: ' + error.message);
                document.getElementById('recordingTimer').innerHTML = '';
            } finally {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('voiceBtn').disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('messageInput');
            if (input) {
                input.addEventListener('input', handleMentionInput);
                input.addEventListener('keydown', handleMentionKeydown);
            }
        });

        function handleMentionInput(e) {
            const input = e.target;
            const value = input.value;
            const cursorPos = input.selectionStart;
            
            const textBeforeCursor = value.substring(0, cursorPos);
            const lastAtIndex = textBeforeCursor.lastIndexOf('@');
            
            if (lastAtIndex !== -1) {
                const afterAt = textBeforeCursor.substring(lastAtIndex + 1);
                
                if (!afterAt.includes(' ')) {
                    const query = afterAt.toLowerCase();
                    const matches = channelUsers.filter(u => 
                        u.username.toLowerCase().startsWith(query)
                    );
                    
                    if (matches.length > 0) {
                        showMentionDropdown(matches);
                        return;
                    }
                }
            }
            
            hideMentionDropdown();
        }

        function handleMentionKeydown(e) {
            const dropdown = document.getElementById('mentionDropdown');
            
            if (!dropdown.classList.contains('active')) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
                return;
            }
            
            const items = dropdown.querySelectorAll('.mention-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                mentionSelectedIndex = Math.min(mentionSelectedIndex + 1, items.length - 1);
                updateMentionSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                mentionSelectedIndex = Math.max(mentionSelectedIndex - 1, 0);
                updateMentionSelection(items);
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                if (items[mentionSelectedIndex]) {
                    items[mentionSelectedIndex].click();
                }
            } else if (e.key === 'Escape') {
                e.preventDefault();
                hideMentionDropdown();
            }
        }

        function showMentionDropdown(users) {
            const dropdown = document.getElementById('mentionDropdown');
            mentionSelectedIndex = 0;
            
            dropdown.innerHTML = users.map((user, index) => {
                const initial = user.username.charAt(0).toUpperCase();
                return `
                    <div class="mention-item ${index === 0 ? 'selected' : ''}" onclick="insertMention('${user.username}')">
                        <div class="mention-item-avatar">${initial}</div>
                        <div class="mention-item-username">${escapeHtml(user.username)}</div>
                    </div>
                `;
            }).join('');
            
            dropdown.classList.add('active');
        }

        function updateMentionSelection(items) {
            items.forEach((item, index) => {
                if (index === mentionSelectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function hideMentionDropdown() {
            const dropdown = document.getElementById('mentionDropdown');
            dropdown.classList.remove('active');
            dropdown.innerHTML = '';
            mentionSelectedIndex = 0;
        }

        function insertMention(username) {
            const input = document.getElementById('messageInput');
            const value = input.value;
            const cursorPos = input.selectionStart;
            
            const textBeforeCursor = value.substring(0, cursorPos);
            const textAfterCursor = value.substring(cursorPos);
            const lastAtIndex = textBeforeCursor.lastIndexOf('@');
            
            const newValue = value.substring(0, lastAtIndex) + '@' + username + ' ' + textAfterCursor;
            input.value = newValue;
            
            const newCursorPos = lastAtIndex + username.length + 2;
            input.setSelectionRange(newCursorPos, newCursorPos);
            
            hideMentionDropdown();
            input.focus();
        }

        async function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                notificationPermission = await Notification.requestPermission();
                if (notificationPermission === 'granted') {
                    showNotification('Notifications enabled!', 'You\'ll be notified of new messages and @mentions');
                }
            } else {
                notificationPermission = Notification.permission;
            }
        }

        function showNotification(title, body, icon = '') {
            if (!('Notification' in window)) return;
            if (Notification.permission !== 'granted') return;
            if (isTabFocused) return;

            const notification = new Notification(title, {
                body: body,
                icon: icon || 'https://api.dicebear.com/7.x/shapes/svg?seed=hivemind',
                badge: 'https://api.dicebear.com/7.x/shapes/svg?seed=hive',
                tag: 'hive-mind-notification'
            });

            notification.onclick = () => {
                window.focus();
                notification.close();
            };

            playNotificationSound();
        }

        function playNotificationSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (e) {
                // Sound failed, ignore
            }
        }

        function checkForMentions(message, currentUsername) {
            const mentionRegex = /@(\w+)/g;
            const mentions = message.match(mentionRegex);
            
            if (mentions) {
                return mentions.some(mention => 
                    mention.toLowerCase() === `@${currentUsername.toLowerCase()}`
                );
            }
            return false;
        }

        function highlightMentions(text, currentUsername) {
            return text.replace(/@(\w+)/g, (match, username) => {
                const isMentioningMe = username.toLowerCase() === currentUsername.toLowerCase();
                const className = isMentioningMe ? 'mention-me' : 'mention';
                return `<span class="${className}">${match}</span>`;
            });
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
        
        init();
    </script>
</body>
</html>
